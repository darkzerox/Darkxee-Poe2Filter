name: Create release

on:
  push:
    tags:
      - v*

permissions:
  contents: write

jobs:
  release:
    name: Release pushed tag
    runs-on: windows-latest
    env:
      PYTHONIOENCODING: utf-8
      PYTHONUTF8: 1
    steps:
      - name: checkout repo content
        uses: actions/checkout@v3

      - name: setup python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if (Test-Path requirements.txt) { pip install -r requirements.txt }
          pip install pyinstaller

      - name: Build filters
        run: python script/start_build.py

      - name: Zip filters
        run: |
          Compress-Archive -Path dist/filter/* -DestinationPath dzx-poe2-filter.zip -Force

      - name: Build EXE Launcher
        run: |
          python -m PyInstaller --onefile --noconsole --name "DZX-PoE2-Filter-Launcher" --add-data "dist/filter;filters" --add-data "dzx_filter/images;dzx_filter/images" script/installer_gui.py

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.ref_name }}
        run: |
          gh release create "$env:tag" dzx-poe2-filter.zip dist/DZX-PoE2-Filter-Launcher.exe --repo="$env:GITHUB_REPOSITORY" --title="$(${env:GITHUB_REPOSITORY}.Split('/')[1]) $(${env:tag}.TrimStart('v'))" --generate-notes